name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for release assets
        run: |
          # Wait up to 10 minutes for release assets to be available
          VERSION="${{ github.event.release.tag_name }}"
          echo "Waiting for release assets to be available..."
          for i in {1..60}; do
            if curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}" | grep -q "sword-tui-darwin-amd64.tar.gz"; then
              echo "Release assets are available!"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 10
          done

      - name: Update Formula with Binary SHA256s
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          
          # Run the update script
          chmod +x scripts/update-formula-binary.sh
          ./scripts/update-formula-binary.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: update Homebrew formula to ${{ env.VERSION }}"
          title: "Update Homebrew formula to ${{ env.VERSION }}"
          body: |
            This PR updates the Homebrew formula to version ${{ env.VERSION }}.
            
            The formula has been updated to use the pre-built binaries for all platforms.
            
            Auto-generated by GitHub Actions.
          branch: update-homebrew-${{ env.VERSION }}
          delete-branch: true